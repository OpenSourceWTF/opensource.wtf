name: Build and deploy to GitHub Pages

on:
  # Rebuild when site code changes
  push:
    branches: [main]

  # Rebuild when blog content changes (dispatched from OpenSourceWTF/blog)
  repository_dispatch:
    types: [blog-content-updated]

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout blog content
        uses: actions/checkout@v4
        with:
          repository: OpenSourceWTF/blog
          path: blog-content

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # Copy index.html to 404.html for SPA client-side routing
      - name: SPA routing fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
